services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jardin_backend
    ports:
      - '4000:4000'
    env_file:
      - .env
    restart: always
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    container_name: jardin_db
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: jardindb
